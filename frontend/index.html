<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swearjar MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="screen" aria-label="Swear Jar tracker">
      <header class="top-bar">
        <h1 class="app-title">Swear Jar</h1>
        <div class="top-bar__actions">
          <p class="streak-badge" id="streak-badge">0 today</p>
          <button
            class="settings-btn"
            id="settings-btn"
            type="button"
            aria-label="Open settings menu"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            ⚙️
          </button>
        </div>
      </header>

      <div class="settings-menu" id="settings-menu" role="menu" aria-label="Settings menu" hidden>
        <button class="settings-menu__item" id="menu-change-code" type="button" role="menuitem">Change session code</button>
        <button class="settings-menu__item" id="menu-change-donation" type="button" role="menuitem">Change donation amount</button>
        <button class="settings-menu__item" id="menu-change-goal" type="button" role="menuitem">Set custom jar goal</button>
      </div>

      <div class="session-strip" aria-label="Your session code">
        <span class="session-strip__label">Your code:</span>
        <span class="session-strip__code" id="session-code-display">—</span>
        <button class="session-strip__copy" id="session-copy-btn" type="button"
          aria-label="Copy session code to clipboard">Copy</button>
      </div>

      <section class="total-area" aria-label="Current owed total">
        <p class="total-label">Total owed</p>
        <p class="total-amount" id="total">$0.00</p>
        <p class="offenses" id="offenses">Clean slate — keep it up!</p>
        <p class="goal-progress" id="goal-progress">Jar goal: $0.00 of $1,000.00</p>
      </section>

      <button class="jar-area" id="jar-area" type="button" aria-label="Tap jar to log swear">
        <span class="reaction-bubble" id="reaction-bubble" aria-live="polite"></span>
        <svg class="jar-svg" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <defs>
            <clipPath id="jarClip">
              <path d="M38 68 Q36 68 34 70 L28 190 Q27 205 40 208 L160 208 Q173 205 172 190 L166 70 Q164 68 162 68 Z" />
            </clipPath>
          </defs>

          <rect x="55" y="38" width="90" height="18" rx="5" fill="var(--lid-main)" stroke="var(--lid-stroke)" stroke-width="1.5" />
          <rect x="60" y="34" width="80" height="10" rx="4" fill="var(--lid-top)" stroke="var(--lid-stroke)" stroke-width="1" />

          <path d="M38 68 Q36 68 34 70 L28 190 Q27 205 40 208 L160 208 Q173 205 172 190 L166 70 Q164 68 162 68 Z" fill="var(--jar-body)" stroke="var(--jar-stroke)" stroke-width="2" />
          <rect x="52" y="56" width="96" height="14" rx="3" fill="var(--jar-neck)" stroke="var(--jar-stroke)" stroke-width="1.5" />

          <rect id="fill-rect" x="28" y="175" width="145" height="34" fill="var(--jar-fill)" clip-path="url(#jarClip)" opacity="0.75" />
          <g id="coins-in-jar" clip-path="url(#jarClip)"></g>

          <ellipse cx="75" cy="120" rx="8" ry="22" fill="white" opacity="0.25" />
          <ellipse cx="68" cy="85" rx="5" ry="10" fill="white" opacity="0.2" />
          <ellipse cx="100" cy="208" rx="60" ry="5" fill="var(--jar-rim)" opacity="0.4" />

          <ellipse cx="80" cy="130" rx="16" ry="17" fill="white" stroke="var(--jar-stroke)" stroke-width="1.5" />
          <ellipse cx="120" cy="130" rx="16" ry="17" fill="white" stroke="var(--jar-stroke)" stroke-width="1.5" />
          <circle class="eye" id="pupil-l" cx="80" cy="132" r="7" fill="var(--eye)" />
          <circle class="eye" id="pupil-r" cx="120" cy="132" r="7" fill="var(--eye)" />
          <circle cx="83" cy="128" r="2.5" fill="white" />
          <circle cx="123" cy="128" r="2.5" fill="white" />

          <path id="mouth" d="M82 160 Q100 155 118 160" stroke="var(--mouth)" stroke-width="2" fill="none" stroke-linecap="round" />
        </svg>
        <span id="coin-el" class="coin">🪙</span>
      </button>

      <p class="tap-hint" id="tap-hint">Tap the jar to add one offense</p>

      <section class="stats-row" aria-label="Daily and weekly counters">
        <article class="stat-card">
          <h2 class="stat-label">Today</h2>
          <p class="stat-value" id="today-count">0</p>
        </article>
        <article class="stat-card">
          <h2 class="stat-label">This week</h2>
          <p class="stat-value" id="week-count">0</p>
        </article>
        <article class="stat-card">
          <h2 class="stat-label">Record</h2>
          <p class="stat-value" id="record-count">0</p>
        </article>
      </section>

      <button class="add-btn" id="add-btn" type="button">Add offense — $1.00</button>
      <button class="reset-btn" id="reset-btn" type="button">Reset jar view</button>
      <p id="status-message" class="status-text" aria-live="polite"></p>

      <section class="history" id="history-area" aria-label="Recent offense history">
        <h2 class="history-label">Recent</h2>
        <div id="history-list"></div>
      </section>
    </main>

    <script type="module" src="./app.js" defer></script>
  </body>
</html>
