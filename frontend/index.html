<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swearjar MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header card">
        <h1>Swearjar</h1>
        <p>Personal accountability, one tap at a time.</p>
      </header>

      <section class="stats-grid" aria-label="Today stats">
        <article class="card stat-card">
          <h2>Today's Swear Count</h2>
          <p id="today-count" class="stat-value">0</p>
        </article>
        <article class="card stat-card">
          <h2>Today's Jar Amount</h2>
          <p id="today-amount" class="stat-value">$0.00</p>
        </article>
      </section>

      <section class="card">
        <h2 class="section-title">Log a Swear</h2>
        <button id="log-button" class="primary-log-button" type="button">+ Log Swear</button>
        <p id="status-message" class="status-text" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2 class="section-title">Settings</h2>
        <label class="settings-row" for="fine-amount">
          Fine amount per swear ($)
          <input id="fine-amount" type="number" min="0.01" step="0.01" value="1.00" />
        </label>
      </section>

      <section class="card">
        <h2 class="section-title">Recent Activity</h2>
        <ul id="recent-activity" class="activity-list">
          <li class="empty-state">No swears logged today.</li>
        </ul>
      </section>

      <section class="card">
        <h2 class="section-title">7-Day Trend</h2>
        <div id="trend-bars" class="trend-bars" aria-label="Swears in last seven days"></div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
