name: Cleanup SWA Preview Environments

on:
  schedule:
    - cron: "30 3 * * *" # Daily at 03:30 UTC
  workflow_dispatch:
    inputs:
      stale_days:
        description: "Delete preview environments older than this many days"
        required: true
        default: "14"
      max_delete:
        description: "Maximum number of environments to delete in one run"
        required: true
        default: "10"
      dry_run:
        description: "Only report stale environments; do not delete"
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  AZURE_SWA_NAME: ${{ vars.AZURE_SWA_NAME }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  cleanup-preview-environments:
    name: Delete stale SWA preview environments
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Delete stale preview environments
        shell: bash
        env:
          INPUT_STALE_DAYS: ${{ github.event.inputs.stale_days || '14' }}
          INPUT_MAX_DELETE: ${{ github.event.inputs.max_delete || '10' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        run: |
          set -euo pipefail

          if [[ -z "${AZURE_SWA_NAME:-}" || -z "${AZURE_RESOURCE_GROUP:-}" ]]; then
            echo "AZURE_SWA_NAME and AZURE_RESOURCE_GROUP repository variables are required."
            exit 1
          fi

          if ! [[ "$INPUT_STALE_DAYS" =~ ^[0-9]+$ ]] || ! [[ "$INPUT_MAX_DELETE" =~ ^[0-9]+$ ]]; then
            echo "stale_days and max_delete must be non-negative integers."
            exit 1
          fi

          az extension add --name staticwebapp --upgrade --only-show-errors >/dev/null

          cutoff_iso=$(date -u -d "$INPUT_STALE_DAYS days ago" +"%Y-%m-%dT%H:%M:%SZ")
          echo "Finding non-production environments older than $cutoff_iso"
          echo "Dry-run mode: $INPUT_DRY_RUN"

          environments_json=$(az staticwebapp environment list \
            --name "$AZURE_SWA_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --output json)

          stale_candidates=$(echo "$environments_json" | jq -c --arg cutoff "$cutoff_iso" '
            map(
              select((.isProduction // false) | not)
              | .timestamp = (.lastUpdatedOn // .createdOn // "1970-01-01T00:00:00Z")
            )
            | map(select(.timestamp < $cutoff))
            | sort_by(.timestamp)
          ')

          stale_count=$(echo "$stale_candidates" | jq 'length')
          if [[ "$stale_count" -eq 0 ]]; then
            echo "No stale preview environments found."
            exit 0
          fi

          echo "Found $stale_count stale preview environments:"
          echo "$stale_candidates" | jq -r '.[] | "- \(.name) (branch=\(.sourceBranch // "unknown"), updated=\(.timestamp))"'

          deleted=0
          mapfile -t stale_names < <(echo "$stale_candidates" | jq -r '.[].name')
          for env_name in "${stale_names[@]}"; do
            if [[ -z "$env_name" ]]; then
              continue
            fi

            if [[ "$deleted" -ge "$INPUT_MAX_DELETE" ]]; then
              echo "Reached max_delete limit ($INPUT_MAX_DELETE)."
              break
            fi

            if [[ "$INPUT_DRY_RUN" == "true" ]]; then
              echo "[dry-run] Would delete environment: $env_name"
            else
              echo "Deleting environment: $env_name"
              az staticwebapp environment delete \
                --name "$AZURE_SWA_NAME" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --environment-name "$env_name" \
                --yes \
                --only-show-errors
            fi

            deleted=$((deleted + 1))
          done

          echo "Processed $deleted stale preview environment(s)."

      - name: Azure logout
        if: always()
        run: az logout
