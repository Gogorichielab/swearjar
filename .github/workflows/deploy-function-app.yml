name: Deploy Azure Function App

# Deploys the SwearJar API to a standalone Azure Function App
# hosted on an App Service Plan and configures its application settings.
#
# DISABLED: As of 2026-04-15, SwearJar uses SWA's managed API instead.
# This workflow is kept for reference but should not be used.
# The SWA deployment workflow (azure-static-web-apps-*.yml) handles API deployment.

on:
  workflow_dispatch: # allow manual trigger only

# Removed automatic push/path triggers to prevent conflicts with SWA managed API deployment

permissions:
  id-token: write   # needed for Azure OIDC login
  contents: read

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "api"  # path to the Functions project
  NODE_VERSION: "20.x"

jobs:
  build:
    name: Build Function App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          npm ci

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: function-app-package
          path: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          retention-days: 1

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: function-app-package
          path: function-app

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: function-app

  configure:
    name: Configure App Settings
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set Function App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          app-settings-json: |
            [
              { "name": "AzureWebJobsStorage",                  "value": "${{ secrets.AZUREWEBJOBSSTORAGE }}" },
              { "name": "AZURE_TABLES_CONNECTION_STRING",        "value": "${{ secrets.AZURE_TABLES_CONNECTION_STRING }}" },
              { "name": "APPLICATIONINSIGHTS_CONNECTION_STRING",  "value": "${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}" },
              { "name": "DEPLOYMENT_STORAGE_CONNECTION_STRING",   "value": "${{ secrets.DEPLOYMENT_STORAGE_CONNECTION_STRING }}" },
              { "name": "FUNCTIONS_WORKER_RUNTIME",               "value": "node" }
            ]

      - name: Set Static Web App API Settings
        run: |
          az staticwebapp appsettings set \
            --name "${{ vars.AZURE_SWA_NAME }}" \
            --setting-names \
              "AZURE_TABLES_CONNECTION_STRING=${{ secrets.AZURE_TABLES_CONNECTION_STRING }}" \
              "APPLICATIONINSIGHTS_CONNECTION_STRING=${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}"

      - name: Azure Logout
        if: always()
        run: az logout
